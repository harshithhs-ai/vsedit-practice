<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Elite | DataMites</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Noto+Sans+Kannada:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0A58CA;
            --secondary: #FF6B00;
        }

        body {
            margin: 0; padding: 0;
            background: #0f172a; /* ಡಾರ್ಕ್ ಥೀಮ್ ಸೈಕಾಲಜಿ - ಪ್ರೀಮಿಯಂ ಫೀಲ್ */
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🌈 Animated Background Glow */
        .bg-glow {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.4;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        /* 🥂 Glass Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-text {
            font-size: 3.5rem;
            line-height: 0.9;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .kannada-font {
            font-family: 'Noto Sans Kannada', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* ⚡ Pulse Button */
        .action-btn {
            background: linear-gradient(135deg, var(--primary), #4facfe);
            padding: 18px 40px;
            border-radius: 16px;
            font-weight: 800;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(10, 88, 202, 0.3);
            transition: 0.3s;
        }

        .action-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card reveal">
        <div class="mb-6 inline-block p-4 rounded-2xl bg-white/5 border border-white/10">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
        </div>

        <h1 class="hero-text mb-4">
            AI <br> <span style="color: var(--secondary);">CORE</span> <br> PAGE
        </h1>

        <p class="kannada-font px-2">
            ಭವಿಷ್ಯದ ತಂತ್ರಜ್ಞಾನವನ್ನು ಕಲಿಯಲು ಸಿದ್ಧರಾಗಿ. <br>
            <strong>DataMites</strong> ನಿಮ್ಮ ಜೊತೆಗಿದೆ.
        </p>

        <button class="action-btn w-full uppercase tracking-widest text-sm">
            ಶುರು ಮಾಡಿ (Start)
        </button>
    </div>

    <script>
        window.onload = () => {
            gsap.from(".reveal", {
                opacity: 0,
                scale: 0.8,
                duration: 1.2,
                ease: "expo.out"
            });
            
            // ಟೆಕ್ಸ್ಟ್ ಅನಿಮೇಷನ್
            gsap.from("h1", {
                y: 30,
                opacity: 0,
                delay: 0.5,
                duration: 0.8
            });
        };
    </script>
</body>
</html>
